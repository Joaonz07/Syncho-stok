[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["echo 'install handled in build phase'"]

[phases.build]
cmds = [
  "cd frontend && npm ci && npm run build && cd ..",
  "cp -r frontend/dist/. backend/public/",
  "cd backend && npm ci && npm run build"
]

[start]
cmd = "node backend/dist/server.js"
