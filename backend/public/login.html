<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syncho Stock - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">Syncho Stock</p>
      <h1>Acesse sua conta</h1>
      <p class="subtitle">Entre com seu email e senha para continuar.</p>

      <form id="login-form" class="form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="voce@empresa.com" required />

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Sua senha" required />
        <label class="check-row" for="show-password">
          <input id="show-password" type="checkbox" />
          Mostrar senha
        </label>

        <button id="submit-btn" type="submit">Entrar</button>
      </form>

      <p id="status" class="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="/auth-guard.js" defer></script>
  <script src="/login.js" defer></script>
</body>
</html>
