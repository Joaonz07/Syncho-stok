<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syncho Stock - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page">
    <section class="card dashboard-card">
      <div class="topbar">
        <div>
          <p class="eyebrow">Client Area</p>
          <h1>Dashboard da empresa</h1>
          <p class="subtitle">Visualizacao restrita por company_id para usuarios CLIENT.</p>
        </div>
        <button id="logout-btn" class="ghost-btn" type="button">Sair</button>
      </div>

      <div class="stats" id="client-stats"></div>

      <div class="tab-nav">
        <button class="tab-btn active" data-tab="tab-dashboard" type="button">Dashboard</button>
        <button class="tab-btn" data-tab="tab-products" type="button">Produtos</button>
        <button class="tab-btn" data-tab="tab-sales" type="button">Vendas</button>
      </div>

      <div class="actions-row">
        <button id="load-data-btn" type="button">Atualizar dados</button>
      </div>

      <section id="tab-dashboard" class="tab-panel active">
        <h3>Analise geral</h3>
        <div id="dashboard-summary" class="table-wrap"></div>

        <h3>Usuarios</h3>
        <div id="users-table" class="table-wrap"></div>

        <h3>Chats</h3>
        <div id="chats-table" class="table-wrap"></div>
      </section>

      <section id="tab-products" class="tab-panel">
        <h3>Novo produto</h3>
        <div class="create-user-grid">
          <input id="new-product-name" placeholder="Nome do produto" />
          <input id="new-product-code" placeholder="Codigo do produto" />
          <input id="new-product-price" placeholder="Preco" type="number" step="0.01" />
          <input id="new-product-quantity" placeholder="Quantidade" type="number" step="1" />
          <button id="create-product-btn" type="button">Adicionar produto</button>
        </div>

        <h3>Produtos</h3>
        <div id="products-table" class="table-wrap"></div>
      </section>

      <section id="tab-sales" class="tab-panel">
        <h3>Nova venda</h3>
        <div class="create-user-grid">
          <input id="new-sale-total" placeholder="Total da venda" type="number" step="0.01" />
          <button id="create-sale-btn" type="button">Registrar venda</button>
        </div>

        <h3>Vendas</h3>
        <div id="sales-table" class="table-wrap"></div>
      </section>

      <p id="client-status" class="status" aria-live="polite"></p>
    </section>
  </main>
  <script src="/auth-guard.js" defer></script>
  <script src="/dashboard.js" defer></script>
</body>
</html>
